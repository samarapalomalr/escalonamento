<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - IA Patrimônio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-sm text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Criar Conta</h1>
        <div class="space-y-4 bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-left">
            <input type="text" id="novo-usuario" placeholder="Escolha um usuário" 
                class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-800 transition">
            
            <input type="password" id="nova-senha" placeholder="Escolha uma senha" 
                class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-800 transition">

            <button onclick="registrar()" id="btn-registrar" 
                class="w-full bg-[#811803] text-white font-bold p-4 rounded-xl shadow-lg hover:bg-red-900 transition disabled:bg-gray-400">
                CADASTRAR
            </button>

            <div class="text-center">
                <button onclick="history.back()" class="text-sm text-gray-500 hover:underline">Voltar para o login</button>
            </div>
        </div>

        <div class="mt-6 p-3 bg-zinc-900 rounded-lg font-mono text-[10px] text-green-400 text-left">
            <p class="uppercase font-bold border-b border-zinc-700 mb-1 text-zinc-400">Debug Registro UFOP:</p>
            <div id="debug-log-reg" class="h-24 overflow-y-auto">
                > Aguardando dados...
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://escalonamento.onrender.com";

        function log(msg, color = "text-green-400") {
            const container = document.getElementById('debug-log-reg');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            container.innerHTML += `<p class="${color}">[${time}] > ${msg}</p>`;
            container.scrollTop = container.scrollHeight;
        }

        async function registrar() {
            const user = document.getElementById('novo-usuario').value;
            const pass = document.getElementById('nova-senha').value;
            const btn = document.getElementById('btn-registrar');

            if(!user || !pass) return alert("Preencha os campos!");

            btn.disabled = true;
            log("Iniciando tentativa de registro...", "text-yellow-400");

            const tentarRegistro = async (n) => {
                if (n <= 0) {
                    log("ERRO: O servidor não respondeu a tempo.", "text-red-500");
                    alert("O servidor está com dificuldades para iniciar. Tente novamente em instantes.");
                    btn.disabled = false;
                    btn.innerText = "CADASTRAR";
                    return;
                }

                btn.innerText = `CADASTRANDO (${11-n}/10)...`;
                log(`Tentando conexão #${11-n}...`);

                try {
                    const response = await fetch(`${API_BASE_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });

                    if(response.ok) {
                        log("USUÁRIO CRIADO!", "text-blue-400");
                        alert("Usuário criado com sucesso!");
                        location.href = 'index.html'; 
                    } else {
                        const error = await response.json();
                        log(`AVISO: ${error.detail || "Erro no cadastro"}`, "text-orange-400");
                        alert(error.detail || "Erro ao cadastrar");
                        btn.disabled = false;
                        btn.innerText = "CADASTRAR";
                    }
                } catch (err) {
                    log("OFFLINE: Servidor ainda em boot...", "text-zinc-500");
                    // Tenta novamente em 7 segundos
                    setTimeout(() => tentarRegistro(n - 1), 7000);
                }
            };

            tentarRegistro(10);
        }

        // Acorda o servidor ao abrir a página de registro também
        window.onload = () => {
            log("Enviando sinal de despertar...");
            fetch(`${API_BASE_URL}/docs`, { mode: 'no-cors' })
                .then(() => log("Sinal enviado. Aguardando resposta do Render."))
                .catch(() => log("Falha no sinal inicial."));
        };
    </script>
</body>
</html>
