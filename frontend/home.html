<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - IA Patrimônio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body class="bg-[#E0E0E0] min-h-screen flex flex-col">

    <header class="bg-white p-4 shadow-sm flex justify-between items-center">
        <button onclick="confirmarSair()" class="text-gray-600"><i class="material-icons">logout</i></button>
        <h1 class="text-lg font-bold text-gray-800 uppercase tracking-widest">IA Patrimônio</h1>
        <button onclick="location.href='mapa.html'" class="text-gray-600"><i class="material-icons">map</i></button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 relative">
        
        <div class="absolute top-4 left-4">
            <button onclick="location.href='duvidas.html'" class="flex items-center bg-red-100 px-4 py-2 rounded-full border border-red-200">
                <i class="material-icons text-red-700 text-sm mr-2">help_outline</i>
                <span class="text-red-700 text-xs font-bold uppercase">Dúvidas</span>
            </button>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-[#85210D]">Olá, <span id="nome-user">Usuário</span></h2>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <button onclick="abrirModal()" class="w-full h-14 bg-[#B1270B] text-white rounded-full font-bold shadow-xl active:scale-95 transition-transform">
                CLASSIFICAR
            </button>
            <button onclick="location.href='historico.html'" class="w-full h-14 bg-[#B1270B] text-white rounded-full font-bold shadow-xl active:scale-95 transition-transform">
                HISTÓRICO
            </button>
            <button onclick="location.href='artigos.html'" class="w-full h-14 bg-[#B1270B] text-white rounded-full font-bold shadow-xl active:scale-95 transition-transform">
                ARTIGOS RELACIONADOS
            </button>
        </div>

        <button onclick="location.href='settings.html'" class="fixed bottom-6 right-6 bg-slate-600 text-white p-4 rounded-full shadow-2xl">
            <i class="material-icons">settings</i>
        </button>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end">
        <div class="bg-white w-full rounded-t-[30px] p-6 animate-slide-up shadow-2xl">
            <div class="w-12 h-1 bg-gray-300 mx-auto rounded-full mb-6"></div>
            <h3 class="text-center font-bold text-gray-700 mb-6">Escolha o tipo de classificação</h3>
            
            <div class="space-y-4">
                <div onclick="irParaClassificacao('Elementos Arquitetônicos')" class="flex items-center p-4 hover:bg-gray-50 rounded-2xl cursor-pointer">
                    <i class="material-icons text-[#811803] text-3xl mr-4">account_balance</i>
                    <div class="text-left">
                        <p class="font-bold text-sm">Elementos Arquitetônicos</p>
                        <p class="text-[10px] text-gray-400 uppercase">5 tipos de elementos</p>
                    </div>
                </div>

                <div onclick="irParaClassificacao('Casa Corrente')" class="flex items-center p-4 hover:bg-gray-50 rounded-2xl cursor-pointer">
                    <i class="material-icons text-[#811803] text-3xl mr-4">house</i>
                    <div class="text-left">
                        <p class="font-bold text-sm">Casa Corrente</p>
                        <p class="text-[10px] text-gray-400 uppercase">Classificação arquitetônica</p>
                    </div>
                </div>

                <div onclick="irParaClassificacao('Janelas Históricas')" class="flex items-center p-4 hover:bg-gray-50 rounded-2xl cursor-pointer">
                    <i class="material-icons text-[#811803] text-3xl mr-4">window</i>
                    <div class="text-left">
                        <p class="font-bold text-sm text-red-900">Janelas Históricas</p>
                        <p class="text-[10px] text-gray-400 uppercase">Nova Categoria</p>
                    </div>
                </div>
            </div>

            <button onclick="fecharModal()" class="w-full mt-6 text-gray-400 font-bold text-sm">CANCELAR</button>
        </div>
    </div>

    <script>
        document.getElementById('nome-user').innerText = localStorage.getItem('usuario') || 'Usuário';

        function abrirModal() { document.getElementById('modal').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modal').classList.add('hidden'); }
        
        function confirmarSair() {
            if(confirm("Deseja encerrar sua sessão?")) {
                localStorage.clear();
                location.href = 'index.html';
            }
        }

        function irParaClassificacao(cat) {
            localStorage.setItem('categoria_atual', cat);
            location.href = 'camera.html';
        }
    </script>

    <style>
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</body>
</html>
