<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login - IA Patrimônio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl border border-gray-200">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">IA Patrimônio</h1>
        
        <div class="space-y-4">
            <input type="text" id="usuario" placeholder="Usuário" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-red-800">
            <input type="password" id="senha" placeholder="Senha" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-red-800">
            
            <button onclick="fazerLogin()" id="btn-entrar" class="w-full bg-[#811803] text-white font-bold p-4 rounded-xl hover:bg-red-900 transition disabled:opacity-50">
                ENTRAR NO SISTEMA
            </button>
        </div>

        <div class="mt-6 p-3 bg-black rounded-lg font-mono text-[10px] text-green-400 overflow-hidden">
            <p class="uppercase font-bold border-b border-green-900 mb-1 text-white">Debug Console:</p>
            <div id="debug-log" class="h-24 overflow-y-auto">
                > Aguardando ação...
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://escalonamento.onrender.com";

        function log(msg) {
            const container = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            container.innerHTML += `<p><span class="text-gray-500">[${time}]</span> ${msg}</p>`;
            container.scrollTop = container.scrollHeight;
        }

        async function fazerLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;
            const btn = document.getElementById('btn-entrar');

            if(!user || !pass) return alert("Preencha os campos!");

            btn.disabled = true;
            log("Iniciando processo de login...");
            log(`Destino: ${API_BASE_URL}/login`);

            const formData = new URLSearchParams();
            formData.append('username', user);
            formData.append('password', pass);

            // TENTATIVA RECURSIVA COM TIMEOUT MANUAL
            const tentar = async (n) => {
                if (n <= 0) {
                    log("<span class='text-red-500'>ERRO: Esgotadas as tentativas.</span>");
                    btn.disabled = false;
                    return;
                }

                log(`Tentativa #${6-n} de 5...`);
                
                // Usamos o AbortController para não deixar a requisição pendurada
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s de timeout

                try {
                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (response.ok) {
                        log("<span class='text-blue-400'>Sucesso! Redirecionando...</span>");
                        const data = await response.json();
                        localStorage.setItem('user_id', data.user_id);
                        localStorage.setItem('token', data.access_token);
                        setTimeout(() => location.href = 'home.html', 1000);
                    } else {
                        const errData = await response.json();
                        log(`<span class='text-yellow-500'>Falha: ${errData.detail || response.status}</span>`);
                        btn.disabled = false;
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        log("Status: Timeout (Servidor não respondeu)");
                    } else {
                        log(`Status: ${err.message}`);
                    }
                    log("Aguardando 5s para re-tentar...");
                    setTimeout(() => tentar(n - 1), 5000);
                }
            };

            tentar(5);
        }

        // Teste de conexão imediato
        window.onload = () => {
            log("Testando comunicação com Render...");
            fetch(`${API_BASE_URL}/docs`, { mode: 'no-cors' })
                .then(() => log("Sinal enviado. Render acordando."))
                .catch(e => log("Erro ao acordar Render."));
        };
    </script>
</body>
</html>
