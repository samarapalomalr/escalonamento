<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IA Patrimônio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-sm text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 tracking-tight">IA Patrimônio</h1>

        <div class="space-y-4 bg-white p-8 rounded-3xl shadow-xl border border-gray-100 text-left">
            <div>
                <input type="text" id="usuario" placeholder="Usuário" onpaste="return true"
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-800 transition">
            </div>
            <div>
                <input type="password" id="senha" placeholder="Senha" onpaste="return true"
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-800 transition">
            </div>

            <button onclick="fazerLogin()" id="btn-entrar" 
                class="w-full bg-[#811803] text-white font-bold p-4 rounded-xl shadow-lg hover:bg-red-900 transition active:scale-95 disabled:bg-gray-400">
                ENTRAR
            </button>

            <div class="pt-2 text-center">
                <button onclick="location.href='registro.html'" class="text-sm text-gray-500 font-medium hover:underline">
                    Criar conta
                </button>
            </div>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Ou</span></div>
            </div>

            <button class="w-full flex items-center justify-center border border-gray-300 p-3 rounded-xl hover:bg-gray-50 transition">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5 mr-3">
                <span class="text-sm font-semibold text-gray-600">Entrar com Google</span>
            </button>
        </div>

        <div class="mt-6 p-3 bg-zinc-900 rounded-lg font-mono text-[10px] text-green-400 text-left">
            <p class="uppercase font-bold border-b border-zinc-700 mb-1 text-zinc-400">Status da Conexão:</p>
            <div id="debug-log" class="h-20 overflow-y-auto">
                > Aguardando ação...
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://escalonamento.onrender.com";

        function log(msg) {
            const container = document.getElementById('debug-log');
            container.innerHTML += `<p>> ${msg}</p>`;
            container.scrollTop = container.scrollHeight;
        }

        async function fazerLogin() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;
            const btn = document.getElementById('btn-entrar');

            if(!user || !pass) return alert("Preencha todos os campos");

            btn.disabled = true;
            btn.innerText = "CONECTANDO...";
            log("Iniciando login...");

            const formData = new URLSearchParams();
            formData.append('username', user);
            formData.append('password', pass);

            const tentar = async (n) => {
                if (n <= 0) {
                    log("<span class='text-red-500 font-bold'>ERRO: Servidor não respondeu.</span>");
                    alert("O servidor do Render demorou demais. Tente clicar em entrar novamente.");
                    btn.disabled = false;
                    btn.innerText = "ENTRAR";
                    return;
                }

                log(`Tentativa ${6-n}/5...`);

                try {
                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData
                    });

                    if(response.ok) {
                        log("<span class='text-blue-400'>Sucesso!</span>");
                        const data = await response.json();
                        localStorage.setItem('usuario', data.username);
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('user_id', data.user_id); 
                        location.href = 'home.html';
                    } else {
                        const err = await response.json();
                        log(`Erro: ${err.detail || response.status}`);
                        alert(err.detail || "Usuário ou senha incorretos");
                        btn.disabled = false;
                        btn.innerText = "ENTRAR";
                    }
                } catch (err) {
                    log(`Falha: Servidor dormindo...`);
                    // Espera 6 segundos para a próxima tentativa automática
                    setTimeout(() => tentar(n - 1), 6000);
                }
            };

            tentar(5);
        }

        // Tenta acordar o servidor assim que a Samara abre o site
        window.onload = () => {
            log("Enviando sinal de despertar...");
            fetch(`${API_BASE_URL}/docs`, { mode: 'no-cors' })
                .then(() => log("Sinal enviado. Aguardando boot."))
                .catch(() => log("Erro ao enviar sinal."));
        };
    </script>
</body>
</html>
